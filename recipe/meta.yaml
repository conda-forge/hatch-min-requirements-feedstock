{% set name = "hatch-min-requirements" %}
{% set version = "0.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/hatch_min_requirements-{{ version }}.tar.gz
  sha256: 047cf2b78281b4ab33d5475c2898351164b2884d0e82a7f211ce0901658c8b13

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >={{ python_min }}
    - hatchling >=0.21.0

test:
  imports:
    - hatch_min_requirements
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/tlambert03/hatch-min-requirements
  summary: Hatchling plugin to create optional-dependencies pinned to minimum versions
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - dcherian
    - tlambert03
